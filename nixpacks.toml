[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.install]
cmds = ["python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt"]

[phases.build]
cmds = []

[start]
cmd = "python manage.py migrate --noinput && daphne -b 0.0.0.0 -p $PORT backend.asgi:application"
