name: Publish Docker Image to AWS ECR, and deploy to AWS Lambda

on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - develop
  #     - feature/devops

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      REPOSITORY: wifi-combat-backend-api
      IMAGE_TAG: ${{ github.sha }}
      AWS_ACCESS_KEY_ID: ${{secrets.AWS_ACCESS_KEY_ID}}
      AWS_SECRET_ACCESS_KEY: ${{secrets.AWS_SECRET_ACCESS_KEY}}
      AWS_DEFAULT_REGION: ${{secrets.AWS_DEFAULT_REGION}}
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up AWS CLI
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-region: ${{env.AWS_DEFAULT_REGION}}
          aws-access-key-id: ${{env.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{env.AWS_SECRET_ACCESS_KEY}}

      # Step 3: Log in to Amazon ECR
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 4: Build the Docker image and push to AWS ECR
      - name: Build, tag, and push docker image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build \
            --build-arg SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            --build-arg DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --build-arg APP_NAME="${{ secrets.APP_NAME }}" \
            --build-arg DEBUG="${{ secrets.DEBUG }}" \
            --build-arg APP_ENV="${{ secrets.APP_ENV }}" \
            --build-arg AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --build-arg AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --build-arg AWS_DEFAULT_REGION="${{ secrets.AWS_DEFAULT_REGION }}" \
            --build-arg AWS_STORAGE_BUCKET_NAME="${{ secrets.AWS_STORAGE_BUCKET_NAME }}" \
            --build-arg DB_HOST="${{ secrets.DB_HOST }}" \
            --build-arg DB_PORT="${{ secrets.DB_PORT }}" \
            --build-arg DB_DATABASE="${{ secrets.DB_DATABASE }}" \
            --build-arg DB_USERNAME="${{ secrets.DB_USERNAME }}" \
            --build-arg DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --build-arg SESSION_DRIVER="${{ secrets.SESSION_DRIVER }}" \
            --build-arg CACHE_DRIVER="${{ secrets.CACHE_DRIVER }}" \
            --build-arg REDIS_HOST="${{ secrets.REDIS_HOST }}" \
            --build-arg REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" \
            --build-arg REDIS_PORT="${{ secrets.REDIS_PORT }}" \
            --build-arg SESSION_CONNECTION="${{ secrets.SESSION_CONNECTION }}" \
            --build-arg MAIL_DRIVER="${{ secrets.MAIL_DRIVER }}" \
            --build-arg MAIL_HOST="${{ secrets.MAIL_HOST }}" \
            --build-arg MAIL_PORT="${{ secrets.MAIL_PORT }}" \
            --build-arg MAIL_USERNAME="${{ secrets.MAIL_USERNAME }}" \
            --build-arg MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}" \
            --build-arg MAIL_ENCRYPTION="${{ secrets.MAIL_ENCRYPTION }}" \
            -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      # Step 5: Add the environment variables needed by the function to run
      # - name: Update Lambda environment variables
      #   run: |
      #     aws lambda update-function-configuration \
      #       --function-name my-lambda-function \
      #       --environment Variables="{
      #         SECRET_KEY=${{ secrets.SECRET_KEY }},
      #         DATABASE_URL=${{ secrets.DATABASE_URL }},
      #         APP_NAME=${{ secrets.APP_NAME }},
      #         DEBUG=${{ secrets.DEBUG }},
      #         APP_ENV=${{ secrets.APP_ENV }},

      #         AWS_ACCESS_KEY_ID=${{secrets.AWS_ACCESS_KEY_ID}}
      #         AWS_SECRET_ACCESS_KEY=${{secrets.AWS_SECRET_ACCESS_KEY}}
      #         AWS_DEFAULT_REGION=${{secrets.AWS_DEFAULT_REGION}}
      #         AWS_STORAGE_BUCKET_NAME=${{secrets.AWS_STORAGE_BUCKET_NAME}}

      #         DB_HOST=${{ secrets.DB_HOST }},
      #         DB_PORT=${{ secrets.DB_PORT }},
      #         DB_DATABASE=${{ secrets.DB_DATABASE }},
      #         DB_USERNAME=${{ secrets.DB_USERNAME }},
      #         DB_PASSWORD=${{ secrets.DB_PASSWORD }},

      #         SESSION_DRIVER=${{ secrets.SESSION_DRIVER }},
      #         CACHE_DRIVE= ${{ secrets.CACHE_DRIVER }},
      #         REDIS_HOST=${{ secrets.REDIS_HOST }},
      #         REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }},
      #         REDIS_PORT=${{ secrets.REDIS_PORT }},
      #         SESSION_CONNECTION=${{ secrets.SESSION_CONNECTION }},

      #         MAIL_DRIVER=${{ secrets.MAIL_DRIVER }},
      #         MAIL_HOST=${{ secrets.MAIL_HOST }},
      #         MAIL_PORT=${{ secrets.MAIL_PORT }},
      #         MAIL_USERNAME=${{ secrets.MAIL_USERNAME }},
      #         MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }},
      #         MAIL_ENCRYPTION=${{ secrets.MAIL_ENCRYPTION }}"
      #     }

      # Step 6: Deploy the app container to AWS Lambda
      - name: Deploy Lambda
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          aws lambda update-function-code --function-name wifi-combat-backend-api --image-uri $REGISTRY/$REPOSITORY:$IMAGE_TAG
